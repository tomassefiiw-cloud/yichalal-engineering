name: yichalal_core
description: Shared models, Supabase client, AI engine, theme.
publish_to: 'none'
version: 1.0.2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Pin to a Supabase release that uses app_links <= 5.x (compatible with Flutter 3.24's gradle DSL)
  supabase_flutter: 2.5.6
  app_links: 5.0.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.19.0
  http: ^1.2.2
  dio: ^5.7.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.3
  image_picker: ^1.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # geolocator 12 supports Flutter 3.16+; works with AGP 8.3 + compileSdk 35.
  geolocator: ^12.0.0
  pdf: ^3.11.1
  open_filex: ^4.5.0
  fl_chart: ^0.69.0
  url_launcher: ^6.3.1
  provider: ^6.1.2

flutter:
  uses-material-design: true
