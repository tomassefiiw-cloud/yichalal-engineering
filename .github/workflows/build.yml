name: Build APKs and upload to gofile

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SUPABASE_URL: https://mfnoyegiuuwthygprjua.supabase.co
  SUPABASE_ANON_KEY: sb_publishable_eDkeKLLqtUKeqKGKGsQVGA_BkcXKz5U
  # OpenRouter API key — base64-encoded to bypass GitHub's secret push protection.
  # The value is a free-tier model key for openai/gpt-oss-120b:free.
  OPENROUTER_KEY_B64: c2stb3ItdjEtNTA1Y2EyZDM5OGY2ODY4ZjkwZDc5YjQ4ODU2Mzg3MDdiZGQwZjU5NmRiMzM0OWQ0OWQxNGIxYjI2MzZiMGEwNA==
  OPENROUTER_MODEL: openai/gpt-oss-120b:free

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Decode OpenRouter key
        id: keys
        run: |
          OPENROUTER_KEY=$(echo "${{ env.OPENROUTER_KEY_B64 }}" | base64 -d)
          echo "::add-mask::$OPENROUTER_KEY"
          echo "OPENROUTER_KEY=$OPENROUTER_KEY" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore yichalal-release.jks \
            -alias yichalal -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass yichalal2025 -keypass yichalal2025 \
            -dname "CN=Yichalal Engineering, OU=Mobile, O=Yichalal, L=Addis Ababa, C=ET"
          cp yichalal-release.jks customer_app/android/yichalal-release.jks
          cp yichalal-release.jks mechanic_app/android/yichalal-release.jks

      # ── Customer app ──
      - name: Customer — pub get
        working-directory: customer_app
        run: flutter pub get

      - name: Customer — build APK
        working-directory: customer_app
        env:
          OPENROUTER_KEY: ${{ env.OPENROUTER_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }} \
            --dart-define=OPENROUTER_KEY=$OPENROUTER_KEY \
            --dart-define=OPENROUTER_MODEL=${{ env.OPENROUTER_MODEL }}

      - name: Customer — rename
        run: mv customer_app/build/app/outputs/flutter-apk/app-release.apk yichalal-customer-v1.0.5.apk

      # ── Mechanic app ──
      - name: Mechanic — pub get
        working-directory: mechanic_app
        run: flutter pub get

      - name: Mechanic — build APK
        working-directory: mechanic_app
        env:
          OPENROUTER_KEY: ${{ env.OPENROUTER_KEY }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL=${{ env.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }} \
            --dart-define=OPENROUTER_KEY=$OPENROUTER_KEY \
            --dart-define=OPENROUTER_MODEL=${{ env.OPENROUTER_MODEL }}

      - name: Mechanic — rename
        run: mv mechanic_app/build/app/outputs/flutter-apk/app-release.apk yichalal-mechanic-v1.0.5.apk

      - name: Zip source
        run: |
          zip -rq yichalal-source-v1.0.5.zip customer_app mechanic_app shared_core supabase README.md \
            -x "*/build/*" "*/.gradle/*" "*/.dart_tool/*"

      - name: Show artifact info
        run: |
          ls -lh *.apk *.zip
          sha256sum *.apk *.zip

      - name: Upload to gofile.io
        id: gofile
        run: |
          set -e
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['servers'][0]['name'])")
          echo "Server: $SERVER"

          CR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-customer-v1.0.5.apk")
          CURL=$(echo "$CR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")
          echo "customer_url=$CURL" >> $GITHUB_OUTPUT

          MR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-mechanic-v1.0.5.apk")
          MURL=$(echo "$MR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")
          echo "mechanic_url=$MURL" >> $GITHUB_OUTPUT

          ZR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-source-v1.0.5.zip")
          ZURL=$(echo "$ZR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")
          echo "source_url=$ZURL" >> $GITHUB_OUTPUT

          {
            echo "## ✅ Yichalal Engineering — Build complete"
            echo ""
            echo "### 📱 Customer APK"
            echo "**$CURL**"
            echo ""
            echo "### 🔧 Mechanic APK"
            echo "**$MURL**"
            echo ""
            echo "### 📦 Source code"
            echo "**$ZURL**"
            echo ""
            echo "### SHA-256"
            echo '```'
            sha256sum *.apk *.zip
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload as workflow artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: yichalal-apks
          path: |
            yichalal-customer-v1.0.5.apk
            yichalal-mechanic-v1.0.5.apk
            yichalal-source-v1.0.5.zip
          retention-days: 30
