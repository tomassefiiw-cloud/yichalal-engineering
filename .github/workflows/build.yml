name: Build APKs and upload to gofile

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore yichalal-release.jks \
            -alias yichalal -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass yichalal2025 -keypass yichalal2025 \
            -dname "CN=Yichalal Engineering, OU=Mobile, O=Yichalal, L=Addis Ababa, C=ET"
          cp yichalal-release.jks customer_app/android/yichalal-release.jks
          cp yichalal-release.jks mechanic_app/android/yichalal-release.jks

      # Customer app
      - name: Customer — pub get
        working-directory: customer_app
        run: flutter pub get

      - name: Customer — build APK
        working-directory: customer_app
        run: |
          flutter build apk --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://mfnoyegiuuwthygprjua.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_eDkeKLLqtUKeqKGKGsQVGA_BkcXKz5U' }}

      - name: Customer — rename
        run: mv customer_app/build/app/outputs/flutter-apk/app-release.apk yichalal-customer-v1.0.0.apk

      # Mechanic app
      - name: Mechanic — pub get
        working-directory: mechanic_app
        run: flutter pub get

      - name: Mechanic — build APK
        working-directory: mechanic_app
        run: |
          flutter build apk --release \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL || 'https://mfnoyegiuuwthygprjua.supabase.co' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY || 'sb_publishable_eDkeKLLqtUKeqKGKGsQVGA_BkcXKz5U' }}

      - name: Mechanic — rename
        run: mv mechanic_app/build/app/outputs/flutter-apk/app-release.apk yichalal-mechanic-v1.0.0.apk

      - name: Zip source
        run: |
          zip -rq yichalal-source-v1.0.0.zip customer_app mechanic_app shared_core supabase README.md \
            -x "*/build/*" "*/.gradle/*" "*/.dart_tool/*"

      - name: Show APK info
        run: |
          ls -lh *.apk *.zip
          sha256sum *.apk *.zip

      - name: Upload to gofile.io
        run: |
          set -e
          SERVER=$(curl -s https://api.gofile.io/servers | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['servers'][0]['name'])")
          echo "Server: $SERVER"

          CR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-customer-v1.0.0.apk")
          CURL=$(echo "$CR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")

          MR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-mechanic-v1.0.0.apk")
          MURL=$(echo "$MR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")

          ZR=$(curl -s -X POST "https://${SERVER}.gofile.io/contents/uploadfile" -F "file=@yichalal-source-v1.0.0.zip")
          ZURL=$(echo "$ZR" | python3 -c "import sys,json;print(json.load(sys.stdin)['data']['downloadPage'])")

          {
            echo "## ✅ Yichalal Engineering — Build complete"
            echo ""
            echo "### 📱 Customer APK"
            echo "**$CURL**"
            echo ""
            echo "### 🔧 Mechanic APK"
            echo "**$MURL**"
            echo ""
            echo "### 📦 Source code"
            echo "**$ZURL**"
            echo ""
            echo "### SHA-256"
            echo '```'
            sha256sum *.apk *.zip
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload as artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: yichalal-apks
          path: |
            yichalal-customer-v1.0.0.apk
            yichalal-mechanic-v1.0.0.apk
            yichalal-source-v1.0.0.zip
          retention-days: 30
